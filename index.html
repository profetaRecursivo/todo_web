<!DOCTYPE html>
<html lang="en">

<head>

    <title>To Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="dinamic">
        <ul id="tasks">
            <li></li>
        </ul>
    </div>
</body>
